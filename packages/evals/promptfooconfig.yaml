# AI Operating CFO — eval harness (Day-0).
#
# Promptfoo runs the agent against five fixture days, and asserts on:
#   - JSON-shape (DailyReport schema is valid)
#   - grounding_rate: every numeric token in content_md must appear in citations[]
#   - feature_recall: the report mentions the canonical drivers for that fixture
#   - citation_validity: every citation id exists in the trace's tool outputs
#
# Day-0 status: fixtures are placeholder JSON shaped like the real DailyReport,
# and assertions reference custom JS in src/assertions.ts. The provider points
# at a placeholder echo-bot until packages/agent.run lands; ANTHROPIC_API_KEY
# is unused in Day-0 so this can run in CI without secrets.

description: AI CFO grounding + feature-recall harness

prompts:
  - "{{report_md}}" # Day-0: echo the fixture's content_md back; real provider runs the agent.

providers:
  - id: echo
    config: {}

defaultTest:
  options:
    transform: |
      // Echo provider: pretend the fixture content_md is the agent's output.
      return { output: vars.report_md };

tests:
  - vars:
      fixture_label: typical
      report_md: "Revenue was $42,000."
    file: ./fixtures/typical.json
    assert:
      - type: javascript
        value: "file://./src/assertions.ts:groundingRate"
      - type: javascript
        value: "file://./src/assertions.ts:featureRecall"

  - vars:
      fixture_label: profit_drop
      report_md: "Contribution profit dropped to $1,200 from $5,400 yesterday."
    file: ./fixtures/profit_drop.json
    assert:
      - type: javascript
        value: "file://./src/assertions.ts:groundingRate"
      - type: javascript
        value: "file://./src/assertions.ts:featureRecall"

  - vars:
      fixture_label: roas_spike
      report_md: "Blended MER hit 4.2x, up from 2.1x."
    file: ./fixtures/roas_spike.json
    assert:
      - type: javascript
        value: "file://./src/assertions.ts:groundingRate"
      - type: javascript
        value: "file://./src/assertions.ts:featureRecall"

  - vars:
      fixture_label: refund_spike
      report_md: "Refund rate climbed to 8.7% (vs 1.2% baseline)."
    file: ./fixtures/refund_spike.json
    assert:
      - type: javascript
        value: "file://./src/assertions.ts:groundingRate"
      - type: javascript
        value: "file://./src/assertions.ts:featureRecall"

  - vars:
      fixture_label: reconciliation_gap
      report_md: "23 orders missing payment in Stripe (delta $3,840)."
    file: ./fixtures/reconciliation_gap.json
    assert:
      - type: javascript
        value: "file://./src/assertions.ts:groundingRate"
      - type: javascript
        value: "file://./src/assertions.ts:featureRecall"

outputPath: ./eval-results.json
