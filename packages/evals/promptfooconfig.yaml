# AI Operating CFO — eval harness.
#
# Promptfoo runs an echo provider against five fixture days and asserts on:
#   - groundingRate: every numeric token in content_md must appear in
#                    fixture.citations[].value
#   - featureRecall: the output mentions every expected_feature
#
# Day-3 status: echo provider returns the fixture's content_md as the agent
# output. Day-N+ will replace the echo with the real Anthropic-driven agent
# so the harness verifies the model's prose, not the fixture's. Until then,
# this harness verifies the assertion mechanics work end-to-end on
# well-formed fixtures.

description: AI CFO grounding + feature-recall harness

prompts:
  - "{{report_md}}" # Echo: the agent's output IS the fixture's content_md.

providers:
  - id: echo
    config: {}

defaultTest:
  options:
    transform: |
      // Echo provider: return the prepared report_md as the agent's
      // output. promptfoo's transform signature is (output, context)
      // — test vars live on context.vars, not the bare `vars`.
      return context.vars.report_md;

# Fixture JSONs ship a `{ fixture: { citations: [...], expected_features: [...] } }`
# blob. We load them via `file://` into a single `fixture` var so
# `context.vars.fixture` resolves the way `src/assertions.ts` expects.
tests:
  - vars:
      fixture_label: typical
      report_md: "Revenue was $42,000."
      fixture: file://./fixtures/typical.json
    assert:
      - type: javascript
        value: "file://./src/assertions.ts:groundingRate"
      - type: javascript
        value: "file://./src/assertions.ts:featureRecall"

  - vars:
      fixture_label: profit_drop
      report_md: "Contribution profit dropped to $1,200 from $5,400 yesterday."
      fixture: file://./fixtures/profit_drop.json
    assert:
      - type: javascript
        value: "file://./src/assertions.ts:groundingRate"
      - type: javascript
        value: "file://./src/assertions.ts:featureRecall"

  - vars:
      fixture_label: roas_spike
      report_md: "Blended MER hit 4.2x, up from 2.1x."
      fixture: file://./fixtures/roas_spike.json
    assert:
      - type: javascript
        value: "file://./src/assertions.ts:groundingRate"
      - type: javascript
        value: "file://./src/assertions.ts:featureRecall"

  - vars:
      fixture_label: refund_spike
      report_md: "Refund rate climbed to 8.7% (vs 1.2% baseline)."
      fixture: file://./fixtures/refund_spike.json
    assert:
      - type: javascript
        value: "file://./src/assertions.ts:groundingRate"
      - type: javascript
        value: "file://./src/assertions.ts:featureRecall"

  - vars:
      fixture_label: reconciliation_gap
      report_md: "23 orders missing payment in Stripe (delta $3,840)."
      fixture: file://./fixtures/reconciliation_gap.json
    assert:
      - type: javascript
        value: "file://./src/assertions.ts:groundingRate"
      - type: javascript
        value: "file://./src/assertions.ts:featureRecall"

outputPath: ./eval-results.json
